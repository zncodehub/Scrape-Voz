<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voz Scraper Controller - Web Control Panel</title>
    <!-- Google Fonts Inter & Fira Code for Terminal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --border-color: #334155;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --terminal-bg: #090d16;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --font-family: 'Inter', sans-serif;
            --mono-font: 'Fira Code', monospace;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--bg-color) 0%, #1e1b4b 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 40px;
        }

        /* Top Header */
        header {
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            background-color: var(--accent-color);
            color: #0f172a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            outline: none;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border: 1px solid var(--accent-color);
            color: #0f172a;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        /* Main Workspace Container */
        .container {
            max-width: 1300px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 25px;
            flex-grow: 1;
        }

        /* Panels layout */
        .config-card, .terminal-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s;
        }

        .panel-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-control {
            width: 100%;
            padding: 12px 14px;
            background-color: #0f172a;
            border: 1.5px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
        }

        .input-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Toggle Switches */
        .toggle-group {
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .toggle-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 80%;
        }

        .toggle-label {
            font-size: 13.5px;
            font-weight: 600;
        }

        .toggle-desc {
            font-size: 11.5px;
            color: var(--text-muted);
        }

        /* Custom Toggle Switch slider styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* CTA Scrape Button */
        .btn-trigger-scrape {
            width: 100%;
            padding: 15px;
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            border: none;
            color: #ffffff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }

        .btn-trigger-scrape:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.5);
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
        }

        .btn-trigger-scrape:disabled {
            background: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Progress Card & Widget */
        .status-container {
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .status-label {
            font-weight: 600;
            color: var(--text-muted);
        }

        .status-value {
            font-weight: 700;
            color: var(--success-color);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--success-color);
            display: inline-block;
        }

        .status-dot.active {
            animation: pulse 1.5s infinite;
        }

        .progress-bar-bg {
            background-color: #0f172a;
            border-radius: 6px;
            height: 10px;
            overflow: hidden;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--accent-color) 0%, #3b82f6 100%);
            height: 100%;
            width: 0%;
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        /* Terminal card & widget */
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            padding: 10px 18px;
        }

        .terminal-tab {
            font-family: var(--mono-font);
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .terminal-tab-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--error-color);
            box-shadow: 0 0 5px var(--error-color);
        }

        .terminal-actions {
            display: flex;
            gap: 8px;
        }

        .terminal-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .terminal-btn:hover {
            color: var(--text-color);
            border-color: var(--text-muted);
            background-color: rgba(255, 255, 255, 0.03);
        }

        .terminal-console {
            background-color: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            flex-grow: 1;
            padding: 20px;
            font-family: var(--mono-font);
            font-size: 13.5px;
            line-height: 1.6;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            height: 520px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        /* Live console text highlighting styles */
        .log-line {
            display: block;
            margin-bottom: 4px;
        }

        .log-info { color: #38bdf8; }
        .log-warning { color: #f59e0b; }
        .log-error { color: #ef4444; }
        .log-success { color: #10b981; }
        .log-dim { color: #475569; }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile Viewport optimization */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .config-card {
                padding: 18px;
            }
            .terminal-console {
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                voz<span>.vn</span> Scraper Controller
            </div>
            <div class="header-actions">
                <a href="/explorer" target="_blank" class="btn btn-outline">
                    📂 Mở Thư Viện (Explorer)
                </a>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Configuration Card Panel -->
        <div class="config-card">
            <h2 class="panel-title">
                ⚙️ Cấu Hình Scraper
            </h2>

            <form id="scrape-form">
                <div class="form-group">
                    <label for="url">Đường Dẫn Thread Voz.vn</label>
                    <input type="url" id="url" class="input-control" placeholder="https://voz.vn/t/title-slug.1236656/" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start_page">Trang Bắt Đầu</label>
                        <input type="number" id="start_page" class="input-control" min="1" placeholder="Mặc định: 1">
                    </div>
                    <div class="form-group">
                        <label for="end_page">Trang Kết Thúc</label>
                        <input type="number" id="end_page" class="input-control" min="1" placeholder="Mặc định: Hết">
                    </div>
                </div>

                <div class="toggle-group">
                    <label class="toggle-item">
                        <div class="toggle-details">
                            <span class="toggle-label">Tải Ảnh Đính Kèm</span>
                            <span class="toggle-desc">Tải ảnh chất lượng cao vào thư mục offline</span>
                        </div>
                        <span class="switch">
                            <input type="checkbox" id="download_images" checked>
                            <span class="slider"></span>
                        </span>
                    </label>

                    <label class="toggle-item">
                        <div class="toggle-details">
                            <span class="toggle-label">Thu Thập Phản Hồi</span>
                            <span class="toggle-desc">Cào đầy đủ danh sách người thích / ưng bài viết</span>
                        </div>
                        <span class="switch">
                            <input type="checkbox" id="fetch_reactions">
                            <span class="slider"></span>
                        </span>
                    </label>

                    <label class="toggle-item">
                        <div class="toggle-details">
                            <span class="toggle-label">Ghi Đè Toàn Bộ</span>
                            <span class="toggle-desc">Bỏ qua bộ nhớ tạm và cào lại từ đầu</span>
                        </div>
                        <span class="switch">
                            <input type="checkbox" id="force">
                            <span class="slider"></span>
                        </span>
                    </label>
                </div>

                <button type="submit" id="submit-btn" class="btn-trigger-scrape">
                    ⚡ Bắt Đầu Cào Dữ Liệu
                </button>
            </form>

            <!-- Dynamic Progress Section -->
            <div class="status-container">
                <div class="status-header">
                    <span class="status-label">TIẾN TRÌNH CÀO</span>
                    <span class="status-value" id="status-display">
                        <span class="status-dot" id="status-dot"></span> Sẵn sàng
                    </span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Terminal Console Panel -->
        <div class="terminal-card">
            <div class="terminal-header">
                <div class="terminal-tab">
                    <span class="terminal-tab-dot" id="console-pulse"></span>
                    <span>console_output.log</span>
                </div>
                <div class="terminal-actions">
                    <button class="terminal-btn" id="autoscroll-toggle">Scroll: Auto</button>
                    <button class="terminal-btn" id="clear-btn">Xóa logs</button>
                </div>
            </div>
            <div class="terminal-console" id="console-output">
<!-- Initial welcome guidelines -->
<span class="log-line log-dim">[System] Khởi tạo WebUI Control Panel thành công.</span>
<span class="log-line log-dim">[System] Nhập URL và nhấn "Bắt đầu cào" để theo dõi trực tiếp logs tại đây.</span>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('scrape-form');
        const submitBtn = document.getElementById('submit-btn');
        const consoleOutput = document.getElementById('console-output');
        const progressFill = document.getElementById('progress-fill');
        const statusDisplay = document.getElementById('status-display');
        const statusDot = document.getElementById('status-dot');
        const clearBtn = document.getElementById('clear-btn');
        const autoscrollToggle = document.getElementById('autoscroll-toggle');
        const consolePulse = document.getElementById('console-pulse');

        let eventSource = null;
        let autoScroll = true;

        // Auto-scroll toggle controller
        autoscrollToggle.addEventListener('click', () => {
            autoScroll = !autoScroll;
            autoscrollToggle.textContent = `Scroll: ${autoScroll ? 'Auto' : 'Manual'}`;
            autoscrollToggle.style.borderColor = autoScroll ? 'var(--border-color)' : 'var(--accent-color)';
        });

        // Clear terminal output
        clearBtn.addEventListener('click', () => {
            consoleOutput.innerHTML = '<span class="log-line log-dim">[System] Console output cleared. Ready for next run.</span>';
            updateProgress(0);
        });

        function updateProgress(percentage) {
            progressFill.style.width = `${percentage}%`;
        }

        function highlightLog(text) {
            let className = '';
            
            if (text.includes('[Error]')) {
                className = 'log-error';
            } else if (text.includes('[Warning]')) {
                className = 'log-warning';
            } else if (text.includes('[Info]') || text.includes('Detecting thread details')) {
                className = 'log-info';
            } else if (text.includes('scraped successfully') || text.includes('complete!') || text.includes('COMPLETED SUCCESSFULLY')) {
                className = 'log-success';
            } else if (text.includes('Preparing to scrape') || text.includes('Downloading') || text.includes('Scraping thread using')) {
                className = 'log-info';
            }

            const span = document.createElement('span');
            span.className = `log-line ${className}`;
            span.textContent = text;
            return span;
        }

        // Main Submit Action
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            // Disable controls
            submitBtn.disabled = true;
            submitBtn.innerHTML = '⏳ Đang Xử Lý Dữ Liệu...';
            statusDot.className = 'status-dot active';
            statusDot.style.backgroundColor = 'var(--warning-color)';
            consolePulse.style.backgroundColor = 'var(--warning-color)';
            consolePulse.style.boxShadow = '0 0 5px var(--warning-color)';
            statusDisplay.innerHTML = '<span class="status-dot" style="background-color: var(--warning-color)"></span> Đang cào...';
            updateProgress(0);

            // Fetch input values
            const url = document.getElementById('url').value;
            const startPage = document.getElementById('start_page').value;
            const endPage = document.getElementById('end_page').value;
            const downloadImages = document.getElementById('download_images').checked;
            const fetchReactions = document.getElementById('fetch_reactions').checked;
            const force = document.getElementById('force').checked;

            // Clear old logs
            consoleOutput.innerHTML = '<span class="log-line log-dim">[System] Khởi chạy luồng scraper subprocess...</span>';

            // Build query params
            const params = new URLSearchParams({
                url: url,
                start_page: startPage,
                end_page: endPage,
                download_images: downloadImages,
                fetch_reactions: fetchReactions,
                force: force
            });

            // Close old event source if exists
            if (eventSource) {
                eventSource.close();
            }

            // Open EventSource SSE connection to stream live subprocess logs
            eventSource = new EventSource(`/api/scrape-stream?${params.toString()}`);

            // Keep track of page stats to calculate live progress percentage
            let startNum = startPage ? parseInt(startPage) : 1;
            let endNum = endPage ? parseInt(endPage) : 0;
            let totalPagesToScrape = 0;

            eventSource.onmessage = (event) => {
                const text = event.data;
                
                // Add highlighted line to console
                const logElement = highlightLog(text);
                consoleOutput.appendChild(logElement);

                if (autoScroll) {
                    consoleOutput.scrollTop = consoleOutput.scrollHeight;
                }

                // RegExp to extract page status and update progress bar dynamically
                // Matches strings like: "Detected Total Pages: 103"
                const detectTotalMatch = text.match(/Detected Total Pages: (\d+)/);
                if (detectTotalMatch) {
                    const detected = parseInt(detectTotalMatch[1]);
                    if (!endNum) {
                        endNum = detected;
                    }
                    totalPagesToScrape = Math.max(1, endNum - startNum + 1);
                }

                // Matches lines like: "[1/10] Page 5 scraped successfully"
                const pageMatch = text.match(/\[(\d+)\/(\d+)\] Page \d+ scraped successfully/);
                if (pageMatch) {
                    const currentScraped = parseInt(pageMatch[1]);
                    const totalPages = parseInt(pageMatch[2]);
                    const percentage = Math.round((currentScraped / totalPages) * 100);
                    updateProgress(percentage);
                    statusDisplay.innerHTML = `<span class="status-dot" style="background-color: var(--warning-color)"></span> Đang cào (${currentScraped}/${totalPages})`;
                }

                // Check for completion status
                if (text.includes('PROCESS COMPLETED SUCCESSFULLY')) {
                    statusDot.className = 'status-dot';
                    statusDot.style.backgroundColor = 'var(--success-color)';
                    consolePulse.style.backgroundColor = 'var(--success-color)';
                    consolePulse.style.boxShadow = '0 0 5px var(--success-color)';
                    statusDisplay.innerHTML = '<span class="status-dot" style="background-color: var(--success-color)"></span> Hoàn thành';
                    updateProgress(100);
                    resetControls();
                    eventSource.close();
                } else if (text.includes('PROCESS TERMINATED WITH ERROR')) {
                    statusDot.className = 'status-dot';
                    statusDot.style.backgroundColor = 'var(--error-color)';
                    consolePulse.style.backgroundColor = 'var(--error-color)';
                    consolePulse.style.boxShadow = '0 0 5px var(--error-color)';
                    statusDisplay.innerHTML = '<span class="status-dot" style="background-color: var(--error-color)"></span> Thất bại';
                    resetControls();
                    eventSource.close();
                }
            };

            eventSource.onerror = (err) => {
                const span = document.createElement('span');
                span.className = 'log-line log-error';
                span.textContent = '[System Connection Error] Mất kết nối SSE stream từ Server.';
                consoleOutput.appendChild(span);
                statusDot.className = 'status-dot';
                statusDot.style.backgroundColor = 'var(--error-color)';
                statusDisplay.innerHTML = '<span class="status-dot" style="background-color: var(--error-color)"></span> Lỗi kết nối';
                resetControls();
                eventSource.close();
            };
        });

        function resetControls() {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '⚡ Bắt Đầu Cào Dữ Liệu';
        }
    </script>
</body>
</html>
